<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión — Visit Potrero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="topbar">
  <div class="brand">Visit<span>Potrero</span></div>
</div>

<div class="container">
  <div class="card">
    <h1>Iniciar sesión</h1>
    <p class="subtitle">Entrá para administrar tu ficha en Visit Potrero.</p>

    <div id="alert" class="alert"></div>

    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" required autocomplete="email">

      <label for="password">Contraseña</label>
      <input type="password" id="password" required autocomplete="current-password">

      <button type="submit" class="btn btn-primary" id="submitBtn">Ingresar</button>
    </form>

    <div class="form-footer">
      ¿No tenés cuenta? <a href="registro.html">Registrate</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script>
const form = document.getElementById('loginForm');
const alertBox = document.getElementById('alert');
const submitBtn = document.getElementById('submitBtn');

function showAlert(message, type) {
  alertBox.textContent = message;
  alertBox.className = 'alert show alert-' + type;
}

// Si ya hay sesión activa, mandar directo al panel.
(async () => {
  const { data } = await supabaseClient.auth.getSession();
  if (data.session) window.location.href = 'panel.html';
})();

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  alertBox.className = 'alert';

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  submitBtn.disabled = true;
  submitBtn.textContent = 'Ingresando...';

  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

  submitBtn.disabled = false;
  submitBtn.textContent = 'Ingresar';

  if (error) {
    if (error.message.includes('Email not confirmed')) {
      showAlert('Todavía no confirmaste tu email. Revisá tu bandeja de entrada.', 'error');
    } else if (error.message.includes('Invalid login credentials')) {
      showAlert('Email o contraseña incorrectos.', 'error');
    } else {
      showAlert(error.message, 'error');
    }
    return;
  }

  window.location.href = 'panel.html';
});
</script>

</body>
</html>
