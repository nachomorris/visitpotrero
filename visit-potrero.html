<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Visit Potrero — Guía de Potrero de los Funes</title>
<meta name="description" content="Guía de experiencias, alojamientos, restaurantes y comercios de Potrero de los Funes, San Luis, Argentina.">
<meta name="theme-color" content="#111111">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --primary:#A3E635;
    --primary-dark:#65A30D;
    --primary-light:#ECFCCB;
    --accent:#A3E635;
    --ink:#111111;
    --muted:#6b7280;
    --bg:#F7F8F3;
    --card:#ffffff;
    --border:#ECECEC;
    --radius:18px;
    --shadow:0 4px 18px rgba(17,17,17,.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Poppins',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--bg);
    color:var(--ink);
    padding-bottom:96px;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none;}
  img{max-width:100%;display:block;}
  button{font-family:inherit;}

  /* App shell */
  .app{max-width:520px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;}

  header.topbar{
    position:sticky;top:0;z-index:20;
    background:var(--ink);
    color:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px;
    border-radius:0 0 22px 22px;
    box-shadow:0 4px 16px rgba(0,0,0,.18);
  }
  header.topbar .logo{
    width:34px;height:34px;border-radius:50%;background:var(--primary);color:var(--ink);
    display:flex;align-items:center;justify-content:center;font-size:16px;flex:none;
  }
  header.topbar .title{font-weight:800;font-size:16px;line-height:1.1;}
  header.topbar .sub{font-size:11px;opacity:.75;font-weight:500;}
  header.topbar .back{
    background:var(--primary);border:none;color:var(--ink);width:32px;height:32px;border-radius:50%;
    font-size:16px;font-weight:800;cursor:pointer;flex:none;
  }
  header.topbar.hidden{display:none;}

  main{padding:16px 16px 8px;}

  /* Home top panel (marca + buscador + categorías, todo integrado) */
  .home-panel{
    background:var(--primary);color:var(--ink);
    border-radius:0 0 28px 28px;
    margin:-16px -16px 24px;padding:14px 16px 18px;
    position:sticky;top:0;z-index:20;
    box-shadow:0 4px 16px rgba(0,0,0,.1);
    transition:background-color .3s ease, padding .28s ease;
    will-change:background-color;
  }
  .home-panel.scrolled{
    background:rgba(163,230,53,.7);
  }
  .home-panel.scrolled.panel-active{
    background:var(--primary);
  }
  .panel-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .panel-topbar .brand{
    display:flex;align-items:center;gap:7px;background:var(--ink);color:#fff;
    padding:6px 14px 6px 6px;border-radius:20px;font-weight:800;font-size:13px;
  }
  .panel-topbar .brand .logo-ic{
    width:22px;height:22px;border-radius:50%;background:var(--primary);color:var(--ink);
    display:flex;align-items:center;justify-content:center;font-size:12px;flex:none;
  }
  .panel-topbar .menu-btn{
    width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.12);
    display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--ink);
    border:none;cursor:pointer;flex:none;
  }

  .section{margin:52px 0 26px;}
  .section:first-of-type{margin-top:0;}
  .section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;}
  .section-head h2{font-size:17px;margin:0;font-weight:700;}
  .section-head .see-all{font-size:12.5px;color:var(--primary-dark);font-weight:600;}
  .section-desc{font-size:12.5px;color:var(--muted);margin:-8px 0 12px;}

  /* Categories row (single row, swipeable) */
  .cat-grid{
    display:flex;gap:16px;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;
    padding:2px 2px 4px;touch-action:pan-x;
    transition:padding .28s ease;
    -ms-overflow-style:none;scrollbar-width:none;
  }
  .home-panel.collapsed .cat-grid{padding-top:0;padding-bottom:0;}
  .home-panel.collapsed{padding-bottom:12px;}
  .cat-grid::-webkit-scrollbar{display:none;}
  .cat-chip{
    flex:0 0 auto;text-align:center;cursor:pointer;background:transparent;border:none;padding:0;
    scroll-snap-align:start;
  }
  .cat-chip .emoji{
    width:52px;height:52px;border-radius:50%;background:var(--ink);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 6px;
    box-shadow:0 3px 8px rgba(0,0,0,.15);overflow:hidden;
    transition:width .25s ease, height .25s ease, margin .25s ease, opacity .2s ease, font-size .25s ease, box-shadow .25s ease;
  }
  .home-panel.collapsed .cat-chip .emoji{
    width:0;height:0;margin:0;opacity:0;font-size:0;box-shadow:none;
  }
  .cat-chip .label{display:block;font-size:10.5px;font-weight:600;color:var(--ink);white-space:nowrap;}
  .cat-chip.active .emoji{outline:2px solid var(--ink);}

  /* Flechitas de scroll de categorías (sutiles, como en el menú de Pehuen) */
  .cat-grid-wrap{position:relative;}
  .edge-fade{
    position:absolute;top:0;bottom:0;width:28px;pointer-events:none;
    transition:opacity .2s ease;z-index:1;
  }
  .edge-fade.left{left:0;background:linear-gradient(to right, var(--bg) 30%, rgba(247,248,243,0));}
  .edge-fade.right{right:0;background:linear-gradient(to left, var(--bg) 30%, rgba(247,248,243,0));}
  .edge-fade.on-panel.left{background:linear-gradient(to right, var(--primary) 40%, rgba(163,230,53,0));}
  .edge-fade.on-panel.right{background:linear-gradient(to left, var(--primary) 40%, rgba(163,230,53,0));}
  .edge-fade.is-hidden{opacity:0;}

  /* Envoltorio de los sliders horizontales (Descuentos / Lugares): degradado fijo, solo del lado derecho */
  .hscroll-wrap{position:relative;}
  .hscroll-wrap .edge-fade{width:16px;}
  .hscroll-wrap .edge-fade.right{background:linear-gradient(to left, var(--bg), rgba(247,248,243,0));}
  .scroll-chevron{
    position:absolute;top:26px;transform:translateY(-50%);
    width:20px;height:30px;
    display:flex;align-items:center;justify-content:center;
    background:none;border:none;box-shadow:none;cursor:pointer;padding:0;
    transition:opacity .2s ease, visibility .2s ease;
    z-index:2;
  }
  /* Flecha dibujada con CSS (no depende de fuentes/emoji, se ve igual en todos lados) */
  .scroll-chevron::before{
    content:'';display:block;width:4px;height:4px;
    border-top:1.5px solid rgba(51,51,51,.75);
    border-right:1.5px solid rgba(51,51,51,.75);
  }
  .scroll-chevron.left::before{transform:rotate(-135deg);margin-left:5px;}
  .scroll-chevron.right::before{transform:rotate(45deg);margin-right:5px;}
  .scroll-chevron.left{left:-2px;}
  .scroll-chevron.right{right:-2px;}
  .scroll-chevron.is-hidden{opacity:0;visibility:hidden;pointer-events:none;}

  /* Map CTA */
  .map-cta{
    display:flex;align-items:center;gap:14px;background:var(--ink);color:#fff;border-radius:20px;
    padding:16px;box-shadow:var(--shadow);cursor:pointer;
  }
  .map-cta .emoji{font-size:30px;}
  .map-cta .t1{font-size:11px;color:var(--primary);font-weight:700;letter-spacing:.03em;}
  .map-cta .t2{font-size:15px;font-weight:700;margin:2px 0;}
  .map-cta .t3{font-size:12px;color:#cbd5e1;}

  /* Horizontal scroller */
  .hscroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;scroll-snap-type:x mandatory;touch-action:pan-x;}
  .hscroll::-webkit-scrollbar{display:none;}
  .place-card{
    flex:0 0 auto;width:200px;background:var(--card);border-radius:18px;overflow:hidden;
    box-shadow:var(--shadow);scroll-snap-align:start;border:1px solid var(--border);
  }
  .place-card .img{height:110px;display:flex;align-items:center;justify-content:center;font-size:34px;color:var(--primary);background:var(--ink);}
  .place-card .body{padding:10px 12px 14px;}
  .place-card .tag{font-size:10px;color:var(--primary-dark);font-weight:700;text-transform:uppercase;letter-spacing:.02em;}
  .place-card .name{font-size:13.5px;font-weight:700;margin:3px 0 4px;}
  .place-card .desc{font-size:11.5px;color:var(--muted);line-height:1.35;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}

  /* Promo cards (idénticas a "Descuentos imperdibles" de PLIN: foto arriba, texto abajo) */
  .promo-card{
    flex:0 0 68%;border-radius:18px;overflow:hidden;background:var(--ink);color:#fff;
    display:flex;flex-direction:column;scroll-snap-align:start;cursor:pointer;
  }
  .promo-card .promo-img{
    height:150px;display:flex;align-items:center;justify-content:center;font-size:44px;
    position:relative;overflow:hidden;
  }
  .promo-card .promo-img img{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  }
  .promo-card .promo-caption{padding:10px 12px 12px;}
  .promo-card .promo-name{font-size:11px;opacity:.8;margin-bottom:3px;}
  .promo-card .promo-highlight{font-size:16px;font-weight:600;margin-bottom:2px;}
  .promo-card .promo-sub{font-size:11px;opacity:.9;}

  /* Business list */
  .biz-list{display:flex;flex-direction:column;gap:10px;}
  .biz-card{
    display:flex;align-items:stretch;background:var(--card);border:1px solid var(--border);border-radius:18px;
    overflow:hidden;box-shadow:var(--shadow);cursor:pointer;min-height:154px;
  }
  .biz-card .thumb{
    width:158px;flex:none;position:relative;overflow:hidden;
    display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff;
  }
  .biz-card .thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .biz-card .info{flex:1;min-width:0;padding:14px 14px 14px 16px;display:flex;flex-direction:column;justify-content:center;}
  .biz-card .badges{display:flex;gap:6px;align-items:center;margin-bottom:2px;flex-wrap:wrap;}
  .badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;}
  .badge.top{background:var(--ink);color:var(--primary);}
  .badge.featured{background:var(--primary);color:var(--ink);}
  .badge.open{background:var(--primary-light);color:var(--primary-dark);}
  .badge.closed{background:#f3f4f6;color:#6b7280;}
  .biz-card .name{font-size:14px;font-weight:700;margin:0 0 2px;}
  .biz-card .cat{font-size:11.5px;color:var(--primary-dark);font-weight:600;}
  .biz-card .addr{font-size:11.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* Search bar */
  .searchbar{
    display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);
    border-radius:14px;padding:10px 14px;box-shadow:var(--shadow);margin-bottom:14px;
  }
  .searchbar input{border:none;outline:none;font-size:14px;flex:1;background:transparent;font-family:inherit;}
  .filter-row{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;touch-action:pan-x;}
  .filter-pill{
    flex:none;border:1px solid var(--border);background:var(--card);border-radius:20px;padding:7px 14px;
    font-size:12px;font-weight:600;cursor:pointer;color:var(--ink);white-space:nowrap;
  }
  .filter-pill.active{background:var(--ink);border-color:var(--ink);color:var(--primary);}

  /* Detail page */
  .detail-hero{height:180px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:56px;color:var(--primary);background:var(--ink);margin-bottom:16px;overflow:hidden;position:relative;}
  .detail-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .detail-title{font-size:21px;font-weight:800;margin:0 0 4px;}
  .detail-cat{font-size:13px;color:var(--primary-dark);font-weight:700;margin-bottom:10px;}
  .detail-badges{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
  .detail-block{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow);}
  .detail-block h3{font-size:12px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);margin:0 0 6px;}
  .detail-block p{margin:0;font-size:14px;line-height:1.5;}
  .detail-row{display:flex;align-items:center;gap:10px;font-size:13.5px;padding:6px 0;}
  .detail-row .ic{width:26px;text-align:center;font-size:15px;}
  .cta-btns{display:flex;gap:10px;margin-top:6px;}
  .cta-btns a{flex:1;text-align:center;padding:12px;border-radius:14px;font-weight:700;font-size:13px;}
  .cta-btns .wsp{background:#25D366;color:#fff;}
  .cta-btns .map{background:var(--ink);color:var(--primary);}

  /* Events / novedades */
  .event-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 16px;box-shadow:var(--shadow);margin-bottom:10px;}
  .event-card .date{font-size:11px;font-weight:700;color:var(--primary-dark);text-transform:uppercase;}
  .event-card h3{font-size:14.5px;margin:4px 0 4px;}
  .event-card p{font-size:12.5px;color:var(--muted);margin:0;line-height:1.4;}

  /* Map */
  #mapview{height:calc(100vh - 200px);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);}
  .leaflet-popup-content{font-family:'Poppins',sans-serif;font-size:13px;}
  .popup-link{color:var(--primary-dark);font-weight:700;font-size:12px;display:inline-block;margin-top:4px;}

  .empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:13.5px;}

  /* Scroll reveal */
  .reveal{
    opacity:0;transform:translateY(26px);
    transition:opacity .6s cubic-bezier(.22,.68,.35,1), transform .6s cubic-bezier(.22,.68,.35,1);
    will-change:opacity,transform;
  }
  .reveal.revealed{opacity:1;transform:translateY(0);}
  @media (prefers-reduced-motion: reduce){
    .reveal{opacity:1;transform:none;transition:none;}
  }

  /* Bottom nav */
  nav.bottomnav{
    position:fixed;bottom:0;left:0;right:0;z-index:30;
    display:flex;justify-content:center;
    padding:0 16px 16px;
    pointer-events:none;
  }
  nav.bottomnav .inner{
    display:flex;gap:4px;border-radius:22px;max-width:100%;
    padding:8px 8px;pointer-events:auto;overflow-x:auto;
    background:rgba(17,17,17,.5);
    -webkit-backdrop-filter:blur(20px) saturate(180%);
    backdrop-filter:blur(20px) saturate(180%);
    border:1px solid rgba(255,255,255,.14);
    box-shadow:0 10px 28px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.12);
    -ms-overflow-style:none;scrollbar-width:none;
  }
  nav.bottomnav .inner::-webkit-scrollbar{display:none;}
  nav.bottomnav a{
    flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 10px 2px;
    font-size:10px;color:#fff;opacity:.62;font-weight:600;cursor:pointer;white-space:nowrap;
    text-shadow:0 1px 3px rgba(0,0,0,.4);
  }
  nav.bottomnav a.active{opacity:1;}
  nav.bottomnav a .ic{
    font-size:16px;width:32px;height:32px;border-radius:50%;display:flex;
    align-items:center;justify-content:center;margin-bottom:1px;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  nav.bottomnav a.active .ic{
    background:var(--primary);
    transform:translateY(-3px) scale(1.08);
    box-shadow:
      0 6px 14px rgba(163,230,53,.55),
      inset 0 1px 1px rgba(255,255,255,.6),
      inset 0 -2px 2px rgba(0,0,0,.18);
  }

  @media (min-width:521px){
    .app{border-left:1px solid var(--border);border-right:1px solid var(--border);}
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar" id="topbar"></header>
  <main id="view"></main>
  <nav class="bottomnav">
    <div class="inner" id="bottomnav"></div>
  </nav>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="data.js"></script>
<script>
/* ============ BORRADOR DEL PANEL DE EDICIÓN (opcional) ============
   Si abriste admin.html en este mismo navegador y estás editando datos,
   esto muestra esos cambios sin publicados acá para que puedas ver una
   vista previa antes de descargar el data.js final. No afecta a nadie
   más que a vos, en tu navegador. */
(function applyAdminDraftIfAny(){
  try{
    const raw = localStorage.getItem('visitPotreroDraft');
    if(!raw) return;
    const draft = JSON.parse(raw);
    if(draft.CATEGORIES) CATEGORIES.splice(0, CATEGORIES.length, ...draft.CATEGORIES);
    if(draft.PLACES) PLACES.splice(0, PLACES.length, ...draft.PLACES);
    if(draft.BUSINESSES) BUSINESSES.splice(0, BUSINESSES.length, ...draft.BUSINESSES);
    if(draft.EVENTS) EVENTS.splice(0, EVENTS.length, ...draft.EVENTS);
    if(draft.NOVEDADES) NOVEDADES.splice(0, NOVEDADES.length, ...draft.NOVEDADES);
  }catch(e){ /* si el borrador está corrupto, seguimos con los datos normales */ }
})();

/* ============ HELPERS ============ */
function allItems(){
  return BUSINESSES.map(b=>({...b, kind:'comercio'}));
}
function getBusiness(id){ return BUSINESSES.find(b=>b.id===id); }
function getPlace(id){ return PLACES.find(p=>p.id===id); }

// Elige siempre la misma foto de ejemplo para un mismo comercio (según su id),
// sin importar en qué lista/orden aparezca — así la card y la ficha coinciden.
function photoForBusiness(b){
  if(b.photo) return b.photo;
  let hash = 0;
  for(let i=0;i<b.id.length;i++){ hash = (hash*31 + b.id.charCodeAt(i)) >>> 0; }
  return SAMPLE_PHOTOS[hash % SAMPLE_PHOTOS.length];
}

function bizThumb(b){
  const c = cat(b.category);
  const photo = photoForBusiness(b);
  return `<div class="thumb" style="background:${c.color}">
    ${photo ? `<img src="${photo}" alt="${b.name}" loading="lazy">` : c.emoji}
  </div>`;
}

function badgesFor(b){
  let h = '';
  if(b.top) h += `<span class="badge top">★ TOP</span>`;
  if(b.featured) h += `<span class="badge featured">☆ Destacado</span>`;
  h += b.open ? `<span class="badge open">● Abierto</span>` : `<span class="badge closed">● Cerrado</span>`;
  return h;
}

function bizCard(b, i){
  return `<div class="biz-card reveal" style="transition-delay:${((i||0)%6)*60}ms" onclick="navigate('/comercio/${b.id}')">
    <div class="info">
      <div class="badges">${badgesFor(b)}</div>
      <div class="name">${b.name}</div>
      <div class="cat">${cat(b.category).label}${b.subcategory ? ' · '+b.subcategory : ''}</div>
      <div class="addr">📍 ${b.address}</div>
    </div>
    ${bizThumb(b, i)}
  </div>`;
}

function promoCard(b, i){
  const c = cat(b.category);
  const highlight = b.top ? '★ Top de Potrero' : (b.featured ? '☆ Recomendado' : c.label);
  const photo = photoForBusiness(b);
  return `<div class="promo-card reveal" style="transition-delay:${(i%4)*70}ms" onclick="navigate('/comercio/${b.id}')">
    <div class="promo-img" style="background:${c.color}">
      ${photo ? `<img src="${photo}" alt="${b.name}" loading="lazy">` : c.emoji}
    </div>
    <div class="promo-caption">
      <div class="promo-name">${b.name}</div>
      <div class="promo-highlight">${highlight}</div>
      <div class="promo-sub">${c.label} · ${b.open ? 'Abierto ahora' : b.hours}</div>
    </div>
  </div>`;
}
/* Nota: estructura de tarjeta calcada de .discount-card de PLIN
   (business chico arriba, título grande, subtítulo chico, foto 150px arriba). */

function placeCard(p, i){
  return `<div class="place-card reveal" style="transition-delay:${((i||0)%4)*70}ms" onclick="navigate('/lugares/${p.id}')">
    <div class="img">${p.emoji}</div>
    <div class="body">
      <div class="tag">${p.type}</div>
      <div class="name">${p.name}</div>
      <div class="desc">${p.desc}</div>
    </div>
  </div>`;
}

/* ============ BLOQUEO DE SWIPE HORIZONTAL (fallback para Safari/iOS) ============ */
// `touch-action:pan-x` no siempre alcanza en Safari/iOS, así que reforzamos
// a mano: si el dedo se mueve más en horizontal que en vertical, bloqueamos
// el scroll vertical de la página mientras dura ese gesto.
function lockHorizontalSwipe(id){
  const el = document.getElementById(id);
  if(!el) return;
  let startX = 0, startY = 0, axis = null;
  el.addEventListener('touchstart', (e) => {
    if(e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    axis = null;
  }, {passive:true});
  el.addEventListener('touchmove', (e) => {
    if(e.touches.length !== 1) return;
    if(axis === null){
      const dx = Math.abs(e.touches[0].clientX - startX);
      const dy = Math.abs(e.touches[0].clientY - startY);
      if(dx > 6 || dy > 6) axis = dx > dy ? 'x' : 'y';
    }
    if(axis === 'x' && e.cancelable) e.preventDefault();
  }, {passive:false});
}

/* ============ FLECHAS DE CATEGORÍAS ============ */
function updateCatChevrons(){
  const grid = document.getElementById('catGrid');
  const left = document.getElementById('catChevronLeft');
  const right = document.getElementById('catChevronRight');
  const fadeLeft = document.getElementById('catFadeLeft');
  const fadeRight = document.getElementById('catFadeRight');
  if(!grid || !left || !right) return;
  const maxScroll = grid.scrollWidth - grid.clientWidth;
  const atStart = grid.scrollLeft <= 4;
  const atEnd = maxScroll <= 4 || grid.scrollLeft >= maxScroll - 4;
  left.classList.toggle('is-hidden', atStart);
  right.classList.toggle('is-hidden', atEnd);
  if(fadeLeft) fadeLeft.classList.toggle('is-hidden', atStart);
  if(fadeRight) fadeRight.classList.toggle('is-hidden', atEnd);
}
function scrollCatGrid(dir){
  const grid = document.getElementById('catGrid');
  if(!grid) return;
  grid.scrollBy({left: dir * 170, behavior:'smooth'});
}
function setupCatChevrons(){
  const grid = document.getElementById('catGrid');
  if(!grid) return;
  grid.addEventListener('scroll', updateCatChevrons, {passive:true});
  updateCatChevrons();
}

/* Degradado fijo del lado derecho de los sliders (Descuentos / Lugares): indica que hay
   más cards para ver, y se esconde solo cuando llegás al final (no tapa nunca la
   card visible porque no hay degradado del lado izquierdo). */
function setupEdgeFade(scrollId, fadeRightId){
  const el = document.getElementById(scrollId);
  const fadeRight = document.getElementById(fadeRightId);
  if(!el || !fadeRight) return;
  const update = () => {
    const maxScroll = el.scrollWidth - el.clientWidth;
    const atEnd = maxScroll <= 4 || el.scrollLeft >= maxScroll - 4;
    fadeRight.classList.toggle('is-hidden', atEnd);
  };
  el.addEventListener('scroll', update, {passive:true});
  update();
}

/* ============ SCROLL REVEAL ============ */
let revealObserver = null;
function initScrollReveal(){
  const els = document.querySelectorAll('.reveal:not(.revealed)');
  if(!els.length) return;
  if(!('IntersectionObserver' in window)){
    els.forEach(el=>el.classList.add('revealed'));
    return;
  }
  if(!revealObserver){
    revealObserver = new IntersectionObserver((entries)=>{
      entries.forEach(entry=>{
        if(entry.isIntersecting){
          entry.target.classList.add('revealed');
          revealObserver.unobserve(entry.target);
        }
      });
    }, {threshold:0.12, rootMargin:'0px 0px -30px 0px'});
  }
  els.forEach(el=>revealObserver.observe(el));
}

/* ---- HOME ---- */
let homeScrollHandler = null;
let homeLastScrollY = 0;
let homeTicking = false;
let homeIsCollapsed = false;
let homeIsScrolled = false;
function setupHomePanelFade(){
  const panel = document.querySelector('.home-panel');
  if(!panel) return;
  if(homeScrollHandler) window.removeEventListener('scroll', homeScrollHandler);
  homeLastScrollY = window.scrollY;
  homeIsCollapsed = false;
  homeIsScrolled = false;
  homeTicking = false;

  const update = () => {
    homeTicking = false;
    const p = document.querySelector('.home-panel');
    if(!p){ window.removeEventListener('scroll', homeScrollHandler); homeScrollHandler = null; return; }
    const y = Math.max(0, window.scrollY);
    const delta = y - homeLastScrollY;

    // Histéresis: umbrales distintos para activar/desactivar, evita parpadeo cerca del límite
    if(y > 24) homeIsScrolled = true;
    else if(y < 6) homeIsScrolled = false;
    p.classList.toggle('scrolled', homeIsScrolled);

    if(y <= 8){
      homeIsCollapsed = false; // arriba del todo: se ve completo
    } else if(delta > 14){
      homeIsCollapsed = true; // bajando de forma sostenida: se esconden los íconos
    } else if(delta < -14){
      homeIsCollapsed = false; // subiendo de forma sostenida: reaparecen
    }
    // deltas chicos (jitter de scroll) no cambian el estado, evita el temblor
    p.classList.toggle('collapsed', homeIsCollapsed);
    homeLastScrollY = y;
  };

  homeScrollHandler = () => {
    if(homeTicking) return;
    homeTicking = true;
    requestAnimationFrame(update);
  };
  window.addEventListener('scroll', homeScrollHandler, {passive:true});
  update();
  // Al tocar/usar el panel vuelve a verse 100% opaco mientras se interactúa.
  const setActive = () => panel.classList.add('panel-active');
  const clearActive = () => panel.classList.remove('panel-active');
  panel.addEventListener('pointerdown', setActive);
  panel.addEventListener('pointerup', () => setTimeout(clearActive, 250));
  panel.addEventListener('pointerleave', clearActive);
  panel.addEventListener('pointercancel', clearActive);
}

/* ---- Búsqueda tolerante a acentos y pequeños errores de tipeo ---- */
function normalizeText(s){
  return (s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
}
function levenshtein(a, b){
  const m = a.length, n = b.length;
  if(m===0) return n;
  if(n===0) return m;
  const dp = Array.from({length:m+1}, (_,i)=>[i, ...new Array(n).fill(0)]);
  for(let j=0;j<=n;j++) dp[0][j] = j;
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      const cost = a[i-1]===b[j-1] ? 0 : 1;
      dp[i][j] = Math.min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+cost);
    }
  }
  return dp[m][n];
}
function fuzzyMatch(query, text){
  const nq = normalizeText(query);
  const nt = normalizeText(text);
  if(!nq) return true;
  if(nt.includes(nq)) return true; // coincidencia directa (ya sin acentos)
  const queryWords = nq.split(/\s+/).filter(Boolean);
  const textWords = nt.split(/\s+/).filter(Boolean);
  return queryWords.every(qw => {
    if(textWords.some(tw => tw.includes(qw) || qw.includes(tw))) return true;
    const maxDist = qw.length <= 4 ? 1 : (qw.length <= 8 ? 2 : 3);
    return textWords.some(tw => levenshtein(qw, tw) <= maxDist);
  });
}

function renderResults(){
  const q = searchState.q.trim();
  let items = BUSINESSES.filter(b=>{
    const matchCat = searchState.cat==='all' || b.category===searchState.cat;
    const matchQ = !q || fuzzyMatch(q, b.name) || fuzzyMatch(q, b.address) || fuzzyMatch(q, cat(b.category).label) || (b.subcategory && fuzzyMatch(q, b.subcategory));
    return matchCat && matchQ;
  });
  document.getElementById('results').innerHTML = items.length ? items.map(bizCard).join('') : `<div class="empty-state">No encontramos resultados. Probá con otra búsqueda.</div>`;
  initScrollReveal();
}

function instagramUrl(v){
  if(!v) return '';
  v = v.trim();
  if(/^https?:\/\//i.test(v)) return v;
  return 'https://instagram.com/' + v.replace(/^@/,'');
}
function websiteUrl(v){
  if(!v) return '';
  v = v.trim();
  if(/^https?:\/\//i.test(v)) return v;
  return 'https://' + v;
}
